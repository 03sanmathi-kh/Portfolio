<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #f0f0f0;
  font-family: sans-serif;
}
.card {
  background: linear-gradient(135deg, #4f6ef7, #5b5bd6);
  border-radius: 20px;
  padding: 3rem 4rem;
  text-align: center;
  max-width: 800px;
  width: 90%;
  box-shadow: 0 8px 32px rgba(79,110,247,0.3);
}
.card .welcome {
  color: rgba(255,255,255,0.9);
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: 1px;
  margin-bottom: 1rem;
}
.card h1 {
  color: #ffffff;
  font-size: 2.8rem;
  font-weight: 800;
  margin-bottom: 1rem;
}
.card p {
  color: rgba(255,255,255,0.85);
  font-size: 1rem;
}
</style>
</head>
<body>
<div class="card">
  <div class="welcome">Welcome to My Portfolio</div>
  <h1>Aspiring Full-Stack Web Developer</h1>
  <p>Crafting elegant solutions with modern web technologies</p>
</div>
</body>
</html>
