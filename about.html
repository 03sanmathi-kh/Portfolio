<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f0f4ff;
  font-family: sans-serif;
  padding: 2rem;
}
h2 {
  text-align: center;
  color: #1a3ab8;
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: 0.4rem;
}
.underline {
  width: 60px;
  height: 3px;
  background: #6b9bfa;
  margin: 0 auto 2rem;
  border-radius: 2px;
}
.card {
  background: #dce8fb;
  border-radius: 12px;
  border-left: 5px solid #6b9bfa;
  padding: 0.5rem 1.5rem;
  max-width: 900px;
  margin: 0 auto 2.5rem;
}
.row {
  display: flex;
  align-items: center;
  padding: 1rem 0;
  border-bottom: 1px solid #b8d0f5;
  gap: 2rem;
}
.row:last-child { border-bottom: none; }
.label {
  color: #1a3ab8;
  font-weight: 700;
  font-size: 0.95rem;
  min-width: 180px;
}
.value {
  color: #222;
  font-size: 0.95rem;
}
.footnote {
  text-align: center;
  color: #1a3ab8;
  font-size: 0.85rem;
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px solid #b8d0f5;
  max-width: 900px;
  margin: 0 auto;
}
</style>
</head>
<body>

  <h2>Student Profile</h2>
  <div class="underline"></div>
  <div class="card">
    <div class="row">
      <span class="label">Name:</span>
      <span class="value">Sanmathi Hegde</span>
    </div>
    <div class="row">
      <span class="label">Department:</span>
      <span class="value">Computer Science & Engineering</span>
    </div>
    <div class="row">
      <span class="label">Semester:</span>
      <span class="value">4th Semester</span>
    </div>
    <div class="row">
      <span class="label">USN:</span>
      <span class="value">01FE24BCS269</span>
    </div>
  </div>

  <h2>Course</h2>
  <div class="underline"></div>
  <div class="card">
    <div class="row">
      <span class="label">Course Name:</span>
      <span class="value">Web Technology</span>
    </div>
    <div class="row">
      <span class="label">Code:</span>
      <span class="value">25ECSP207</span>
    </div>
    <div class="row">
      <span class="label">Under the Guidance of:</span>
      <span class="value">Ms.Ashrafunnisa Mulla</span>
    </div>
    <div class="row">
      <span class="label">Credits:</span>
      <span class="value">2</span>
    </div>
  </div>

  <div class="footnote">
    Sanmathi Hegde &nbsp;|&nbsp; 01fe24bcs269@kletech.ac.in
  </div>

</body>
</html>
